version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aicruzz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aicruzz
      POSTGRES_PASSWORD: aicruzz_pass
      POSTGRES_DB: aicruzz_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aicruzz -d aicruzz_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aicruzz_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ''
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: aicruzz_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/api/.env
    ports:
      - '4000:4000'
    volumes:
      - ./apps/api/uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://aicruzz:aicruzz_pass@postgres:5432/aicruzz_db
      REDIS_URL: redis://redis:6379

volumes:
  postgres_data:
  redis_data:
